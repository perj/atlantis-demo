# Ingress-nginx configuration for Kind cluster
controller:
  # Set the ingress controller to run on the control-plane node
  nodeSelector:
    ingress-ready: "true"

  # Tolerate the control-plane taint
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Equal
      effect: NoSchedule

  # Use hostPort for Kind compatibility
  service:
    type: NodePort

  # Publish services using host ports
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443

  # Enable status and metrics
  metrics:
    enabled: true

  # Resource limits for local development
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
