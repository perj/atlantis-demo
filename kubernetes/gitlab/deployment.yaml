apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
  labels:
    app: gitlab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      hostname: gitlab
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:18.6.6-ce.0
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
            - name: ssh
              containerPort: 22
          env:
            # External URL configuration
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
                external_url 'http://gitlab.127.0.0.1.nip.io'

                # Disable HTTPS
                nginx['listen_https'] = false
                nginx['listen_port'] = 80

                # Disable monitoring/observability features
                prometheus_monitoring['enable'] = false

                # Disable features we don't need for demo
                registry['enable'] = false
                gitlab_pages['enable'] = false
                pages_nginx['enable'] = false
                mattermost['enable'] = false
                sentinel['enable'] = false

                # Reduce resource usage
                puma['worker_processes'] = 2
                sidekiq['max_concurrency'] = 10
                postgresql['shared_buffers'] = "256MB"
                postgresql['max_worker_processes'] = 4

                # Git settings
                gitlab_rails['gitlab_shell_ssh_port'] = 22

                # Faster startup for demo
                gitlab_rails['initial_root_password'] = ENV['GITLAB_ROOT_PASSWORD']
                gitlab_rails['auto_migrate'] = true

            - name: GITLAB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-root-password
                  key: password
          resources:
            requests:
              cpu: 500m
              memory: 3Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: gitlab-data
              mountPath: /var/opt/gitlab
            - name: gitlab-config
              mountPath: /etc/gitlab
            - name: gitlab-logs
              mountPath: /var/log/gitlab
          livenessProbe:
            httpGet:
              path: /users/sign_in
              port: 80
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /users/sign_in
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: gitlab-data
          persistentVolumeClaim:
            claimName: gitlab-data
        - name: gitlab-config
          persistentVolumeClaim:
            claimName: gitlab-config
        - name: gitlab-logs
          persistentVolumeClaim:
            claimName: gitlab-logs
